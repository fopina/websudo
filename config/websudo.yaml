listen: 127.0.0.1:8080
block_unconfigured_destinations: false

tls:
  generate_on_boot: true
  ca_cert_path: ~/.local/share/websudo/ca.pem
  ca_key_path: ~/.local/share/websudo/ca-key.pem

services:
  github-forward:
    match_host: api.github.com
    base_url: https://api.github.com
    placeholder_auth: Authorization
    require_placeholder_prefix: "Bearer ph_"
    inject_auth: env:GITHUB_TOKEN
    allowed_methods:
      - GET
      - POST
    allowed_paths:
      - /user
    denied_paths:
      - /user/emails
    headers_allow:
      - Accept
      - Content-Type
      - User-Agent
    variants:
      - name: repo-write
        placeholder_contains: repo_write
        inject_auth: env:GITHUB_REPO_TOKEN
        allowed_paths:
          - /repos/*/*

  github-reverse:
    route_prefix: /github
    base_url: https://api.github.com
    placeholder_auth: Authorization
    require_placeholder_prefix: "Bearer ph_"
    inject_auth: env:GITHUB_TOKEN
    allowed_methods:
      - GET
      - POST
    allowed_paths:
      - /user
    variants:
      - name: admin
        placeholder_contains: admin
        inject_auth: env:GITHUB_ADMIN_TOKEN
        allowed_paths:
          - /user
          - /repos/*/*
          - /orgs/*

  github-browser:
    match_host: github.com
    base_url: https://github.com
    placeholder_auth: cookie:websudo_ph
    require_placeholder_prefix: "ph_"
    inject_auth: env:GITHUB_SESSION
    inject_auth_target: cookie:user_session
    cookie_encryption_key: env:WEBSUDO_COOKIE_SECRET
    allowed_methods: [GET]
    allowed_paths:
      - /settings/profile

  app-browser:
    route_prefix: /app
    base_url: https://internal.example.com
    # cookies issued by upstream are encrypted before they reach the client;
    # cookies that do not decrypt later are passed through unchanged.
    cookie_encryption_key: env:WEBSUDO_COOKIE_SECRET
    allowed_methods: [GET, POST]
    allowed_paths:
      - /dashboard
    login:
      # login.path is intentionally allowed without placeholder-auth gating so
      # the upstream session can be established first.
      path: /session
      username_field: username
      password_field: password
      username: env:APP_LOGIN_USER
      password: env:APP_LOGIN_PASS
