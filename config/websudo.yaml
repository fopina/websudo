listen: 127.0.0.1:8080

services:
  github:
    match_host: api.github.com
    base_url: https://api.github.com
    placeholder_auth: Authorization
    require_placeholder_prefix: "Bearer ph_"
    inject_auth: env:GITHUB_TOKEN
    allowed_methods:
      - GET
      - POST
    allowed_paths:
      - /user
      - /repos/*
    denied_paths:
      - /user/emails
    headers_allow:
      - Accept
      - Content-Type
      - User-Agent
