## default values
# listen: 127.0.0.1:8080
# block_unconfigured_destinations: false

# tls:
#   require_existing_ca: false
#   ca_cert_path: ~/.local/share/websudo/ca.pem
#   ca_key_path: ~/.local/share/websudo/ca-key.pem

services:
  github-forward:
    auth_mode: header
    match_host: api.github.com
    base_url: https://api.github.com
    placeholder_auth: Authorization
    require_placeholder_prefix: "Bearer ph_"
    inject_auth: env:GITHUB_TOKEN
    allowed_methods:
      - GET
      - POST
    allowed_paths:
      - /user
    denied_paths:
      - /user/emails
    headers_allow:
      - Accept
      - Content-Type
      - User-Agent
    variants:
      - name: repo-write
        placeholder_contains: repo_write
        inject_auth: env:GITHUB_REPO_TOKEN
        allowed_paths:
          - /repos/*/*

  github-reverse:
    auth_mode: header
    route_prefix: /github
    base_url: https://api.github.com
    placeholder_auth: Authorization
    require_placeholder_prefix: "Bearer ph_"
    inject_auth: env:GITHUB_TOKEN
    allowed_methods:
      - GET
      - POST
    allowed_paths:
      - /user
    variants:
      - name: admin
        placeholder_contains: admin
        inject_auth: env:GITHUB_ADMIN_TOKEN
        allowed_paths:
          - /user
          - /repos/*/*
          - /orgs/*

  dojo-browser:
    auth_mode: cookie
    # defectdojo has HSTS so you need to add websudo CA as trusted CA to your browser/system to be able to connect to it via this setup
    match_host: pro.demo.defectdojo.com
    base_url: https://pro.demo.defectdojo.com
    # cookies issued by upstream are encrypted before they reach the client;
    # cookies that do not decrypt later are passed through unchanged.
    # optional override; otherwise websudo generates a persisted key file next
    # to the config automatically for login services.
    cookie_encryption_key_path: ./app-browser.cookie-key.test
    allowed_methods: [GET, POST]
    login:
      # login.path is intentionally allowed without placeholder-auth gating so
      # the upstream session can be established first.
      path: /login
      username_field: username
      password_field: password
      # Client-submitted credentials must match before they are replaced.
      placeholder_username: app
      placeholder_password: app
      # THESE ARE NOT SECRETS - public demo credentials from:
      # https://github.com/DefectDojo/django-DefectDojo/#demo
      # use "env:" variables if setting up with real ones
      username: admin
      password: "1Defectdojo@demo#appsec"
