name: 🧭 e2e

on:
  push:
    branches:
      # just for coverage on main branch - PRs are covered by publish-dev
      - main
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run GitHub API e2e
        env:
          WEBSUDO_E2E_GITHUB_AUTH: Bearer ${{ github.token }}
          WEBSUDO_E2E_COVERAGE_OUT: coverage.out
        run: make e2e

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          flags: e2e
